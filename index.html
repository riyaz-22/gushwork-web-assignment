<!DOCTYPE html>
<html lang="en">

<head>
     <!-- Meta -->
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />

     <!-- SEO -->
     <meta name="description" content="Mangalam Pipes responsive product landing page" />

     <!-- Title -->
     <title>Mangalam Pipes</title>

     <!-- Favicon -->
     <link rel="icon" type="image/svg+xml" href="./assets/images/logo/logo-mangalam-pipes.svg" />

     <!-- CSS -->
     <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

     <!-- Header -->
     <header class="header">
          <div class="header-announcement" aria-hidden="true">
               <div class="header-announcement__content">
                    <span>Trusted Industrial Piping Since 1999</span>
                    <a href="#" class="header-announcement__link">Get Technical Support</a>
               </div>
          </div>

          <nav class="navbar">
               <div class="logo">
                    <img src="./assets/images/logo/logo-mangalam-pipes.png" alt="Mangalam Pipes Logo" />
               </div>

               <div class="nav-actions">
                    <ul class="nav-links">
                         <li><a href="#">About Us</a></li>
                         <li class="nav-dropdown">
                              <button class="nav-dropdown__toggle" type="button" aria-expanded="false"
                                   aria-controls="products-menu">
                                   <span>Products</span>
                                   <span class="nav-dropdown__caret" aria-hidden="true"></span>
                              </button>

                              <ul class="nav-dropdown__menu" id="products-menu">
                                   <li><a href="#">HDPE Pipes</a></li>
                                   <li><a href="#">Pipe Fittings</a></li>
                                   <li><a href="#">Coils</a></li>
                                   <li><a href="#">Accessories</a></li>
                              </ul>
                         </li>
                    </ul>

                    <a href="#" class="nav-contact">Contact Us</a>
               </div>
          </nav>
     </header>

     <!-- Main -->
     <main>

          <!-- Hero Section -->
          <section class="hero">
               <div class="container">
                    <h1>High Quality HDPE Pipes & Fittings</h1>
                    <p>
                         Reliable piping solutions engineered for modern infrastructure.
                    </p>

                    <button class="btn-primary">
                         Explore Products
                    </button>
               </div>
          </section>

     </main>

     <!-- Footer -->
     <footer class="footer">
          <p>&copy; 2026 Mangalam Pipes. All rights reserved.</p>
     </footer>

     <!-- JavaScript -->
     <script src="./js/header.js"></script>
     <script src="./js/main.js"></script>
</body>

</html>
